<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облако слов — СИБУР Форум</title>
<style>
/* 1. ОФИЦИАЛЬНЫЙ ШРИФТ СИБУР */
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 2. СТРОГАЯ КОРПОРАТИВНАЯ ПАЛИТРА */
  --sibur-dna: #008C95;      /* ДНК СИБУР */
  --sibur-dark: #00313C;     /* Тёмно-зелёный (Фон) */
  --sibur-mint: #77E2C3;     /* Мятный */
  --sibur-orange: #E04E39;   /* Ярко-оранжевый (Акцент) */
  --sibur-beige: #FFE6D7;    /* Светлый бежевый */
  --sibur-white: #FFFFFF;    /* Белый */
  
  --border-color: rgba(119, 226, 195, 0.2);
}

html, body { 
  width: 100%; height: 100%; 
  background: var(--sibur-dark); 
  color: var(--sibur-white); 
  font-family: 'Roboto', Arial, sans-serif; 
  /* 3. ВЕСЬ ТЕКСТ КАПСОМ, КАК ЗАПРАШИВАЛОСЬ */
  text-transform: uppercase; 
  overflow: hidden; 
}

/* Модульная сетка на фоне (по брендбуку) без использования картинок */
body::before { 
  content: ''; 
  position: absolute; inset: 0; 
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); 
  background-size: 80px 80px; 
  pointer-events: none; 
  z-index: 0;
}

/* ── VIEWS ── */
#editorView, #cloudView {
  position: fixed; inset: 0;
  transition: opacity 0.5s ease;
}
#editorView { 
  z-index: 10; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; 
  padding: 40px 20px; overflow-y: auto; 
}
#cloudView  { z-index: 5; opacity: 0; pointer-events: none; display: flex; flex-direction: column; }
#cloudView.active  { opacity: 1; pointer-events: all; }
#editorView.hidden { opacity: 0; pointer-events: none; }

/* ── EDITOR ── */
.editor-wrap { width: 100%; max-width: 680px; position: relative; z-index: 10; }

.logo-text { 
  font-weight: 700; font-size: 1.5rem; letter-spacing: 0.1em; 
  color: var(--sibur-white); margin-bottom: 24px; text-align: center; 
}
.logo-text span { color: var(--sibur-mint); font-weight: 300; }

h1 {
  font-weight: 700;
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: 0.02em; line-height: 1.1;
  color: var(--sibur-white);
  margin-bottom: 8px;
  text-align: center
}
.subtitle { 
  font-weight: 300; font-size: 1rem; letter-spacing: 0.05em; 
  color: var(--sibur-mint); margin-bottom: 32px; text-align: center 
}

.input-box { 
  background: rgba(0, 0, 0, 0.15); 
  border: 1px solid var(--border-color); 
  border-radius: 4px; /* Минимальное скругление, строгость */
  overflow: hidden; margin-bottom: 14px; 
}
.input-top { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 12px 20px; border-bottom: 1px solid var(--border-color); 
  background: rgba(255,255,255,0.02); 
}
.input-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: var(--sibur-white); }
.word-count  { font-size: 0.8rem; color: var(--sibur-orange); font-weight: 700; }

textarea { 
  width: 100%; background: transparent; border: none; outline: none; 
  color: var(--sibur-white); font-family: 'Roboto', sans-serif; font-size: 0.95rem; 
  line-height: 1.8; padding: 20px; resize: none; height: 180px; 
  text-transform: uppercase;
}
textarea::placeholder { color: rgba(255,255,255,0.3); }

.hint { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-bottom: 24px; line-height: 1.6; font-weight: 300; }
.hint strong { color: var(--sibur-mint); font-weight: 700; }

/* Кнопка с официальным градиентом СИБУР (45 градусов) */
.btn-launch { 
  width: 100%; padding: 18px; 
  background: linear-gradient(45deg, var(--sibur-dna), var(--sibur-mint)); 
  border: none; border-radius: 4px; 
  color: var(--sibur-dark); font-family: 'Roboto', sans-serif; 
  font-weight: 700; font-size: 1.1rem; letter-spacing: 0.1em; 
  cursor: pointer; transition: transform 0.2s, opacity 0.2s; 
  text-transform: uppercase;
}
.btn-launch:hover { transform: translateY(-2px); opacity: 0.95; }

/* ── CLOUD VIEW ── */
.cloud-header { 
  position: relative; z-index: 20; 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 16px 32px; border-bottom: 1px solid var(--border-color); 
  background: var(--sibur-dark); flex-shrink: 0; 
}
.cloud-title { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--sibur-white); }
.cloud-title span { font-weight: 300; color: var(--sibur-mint); margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border-color); }
.cloud-stats { font-size: 0.8rem; color: rgba(255,255,255,0.7); font-weight: 300; letter-spacing: 0.05em; }
.cloud-stats span { color: var(--sibur-orange); font-weight: 700; }

.btn-back { 
  background: transparent; border: 1px solid var(--border-color); color: var(--sibur-white); 
  font-family: 'Roboto', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; 
  padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s; 
  text-transform: uppercase;
}
.btn-back:hover { border-color: var(--sibur-mint); color: var(--sibur-mint); }

#cloudStage { flex: 1; position: relative; overflow: hidden; }

/* ── WORDS ── */
.word {
  position: absolute;
  font-family: 'Roboto', sans-serif;
  font-weight: 700; /* Массивное начертание для слов */
  letter-spacing: 0.02em;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transform-origin: center center;
  transition: transform 0.2s, opacity 0.2s;
  /* Убрали text-shadow (запрещено гайдлайном) */
  animation: wordIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.word:hover { color: var(--sibur-white) !important; transform: scale(1.1); z-index: 999 !important; }

@keyframes wordIn {
  from { opacity: 0; transform: scale(0.3); }
  to   { opacity: 1; transform: scale(1); }
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; z-index: 1000;
  background: var(--sibur-white);
  border: 1px solid var(--sibur-mint);
  border-radius: 4px; padding: 14px 20px;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  /* Простая жесткая тень без размытия, если нужно, но лучше без нее по брендбуку */
  box-shadow: 4px 4px 0 rgba(0, 140, 149, 0.2); 
  min-width: 160px;
}
#tooltip.visible { opacity: 1; }
.tt-word { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.2rem; color: var(--sibur-dark); margin-bottom: 8px; }
.tt-row  { display: flex; justify-content: space-between; gap: 24px; font-size: 0.75rem; color: var(--sibur-dna); font-weight: 400; margin-top: 4px; }
.tt-row span { color: var(--sibur-orange); font-weight: 700; }
</style>
</head>
<body>

<!-- EDITOR -->
<div id="editorView">
  <div class="editor-wrap">
    <div class="logo-text">СИБУР <span>Форум</span></div>
    <h1>Облако слов</h1>
    <p class="subtitle">Интерактивная визуализация ответов корпоративных тренеров</p>
    
    <div class="input-box">
      <div class="input-top">
        <span class="input-label">Ответы участников</span>
        <span class="word-count" id="wordCountBadge">0 слов</span>
      </div>
      <textarea id="rawInput" placeholder="лидерство, развитие, команда&#10;доверие&#10;мотивация, рост..."></textarea>
    </div>
    
    <p class="hint">Формат: <strong>через запятую</strong>, <strong>пробел</strong> или <strong>с новой строки</strong>. Одинаковые слова объединяются — чаще = крупнее.</p>
    <button class="btn-launch" onclick="launch()">Показать облако</button>
  </div>
</div>

<!-- CLOUD -->
<div id="cloudView">
  <div class="cloud-header">
    <div class="cloud-title">СИБУР <span>Форум</span></div>
    <div class="cloud-stats">Всего слов: <span id="statTotal">0</span> &nbsp;&nbsp;|&nbsp;&nbsp; Уникальных: <span id="statUniq">0</span></div>
    <button class="btn-back" onclick="goBack()">Редактировать</button>
  </div>
  <div id="cloudStage"></div>
</div>

<div id="tooltip">
  <div class="tt-word" id="ttWord"></div>
  <div class="tt-row">Упоминаний <span id="ttCount"></span></div>
  <div class="tt-row">Доля <span id="ttPct"></span></div>
</div>

<script>
// Чистая палитра из брендбука СИБУР
const COLORS = ['#008C95', '#77E2C3', '#E04E39', '#FFE6D7', '#FFFFFF'];

// Словарь стоп-слов
const STOP_WORDS = new Set([
  'и', 'а', 'но', 'да', 'или', 'ли', 'как', 'что', 'чтобы', 'это', 
  'я', 'мы', 'ты', 'вы', 'он', 'она', 'оно', 'они', 
  'в', 'на', 'с', 'по', 'к', 'о', 'об', 'из', 'от', 'за', 'у', 'для', 'до', 'при',
  'не', 'ни', 'же', 'то', 'бы', 'все', 'всего', 'так', 'если', 'есть', 'быть',
  'его', 'ее', 'их', 'этот', 'эта', 'эти', 'там', 'тут', 'здесь', 'очень', 'уже',
  'spa', 'css', 'мс', 'html'
]);

const editorView = document.getElementById('editorView');
const cloudView  = document.getElementById('cloudView');
const cloudStage = document.getElementById('cloudStage');
const tooltip    = document.getElementById('tooltip');
const rawInput   = document.getElementById('rawInput');

let totalResponses = 0;

rawInput.addEventListener('input', () => {
  const n = parseWords(rawInput.value).length;
  document.getElementById('wordCountBadge').textContent = n + ' ' + plural(n,'слово','слова','слов');
});

function plural(n, a, b, c) {
  const m = n % 10, h = n % 100;
  if (m === 1 && h !== 11) return a;
  if (m >= 2 && m <= 4 && (h < 10 || h >= 20)) return b;
  return c;
}

function parseWords(text) {
  return text.split(/[\n,;\s]+/)
    .map(w => w.trim().toLowerCase().replace(/[^а-яёa-z\-]/gi,''))
    .map(w => w.replace(/^-+|-+$/g, ''))
    .filter(w => w.length > 1)
    .filter(w => !STOP_WORDS.has(w));
}

function getFreq(words) {
  const f = {};
  for (const w of words) f[w] = (f[w]||0) + 1;
  return Object.entries(f).sort((a,b) => b[1]-a[1]);
}

function launch() {
  const words = parseWords(rawInput.value);
  if (!words.length) { alert('Введите слова!'); return; }
  totalResponses = words.length;
  const freq = getFreq(words);
  document.getElementById('statTotal').textContent = totalResponses;
  document.getElementById('statUniq').textContent  = freq.length;
  editorView.classList.add('hidden');
  cloudView.classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => renderCloud(freq)));
}

function goBack() {
  editorView.classList.remove('hidden');
  cloudView.classList.remove('active');
}

/* ─────────────────────────────────────────
   RENDER — pixel-collision spiral placement
───────────────────────────────────────── */
function renderCloud(freq) {
  cloudStage.innerHTML = '';

  const W = cloudStage.offsetWidth;
  const H = cloudStage.offsetHeight;
  if (!W || !H) return;

  const maxCount = freq[0][1];

  const maxFS = Math.round(Math.min(W, H) * 0.14);
  const minFS = Math.max(16, Math.round(maxFS * 0.18));

  const mc = document.createElement('canvas');
  mc.width = W; mc.height = H;
  const mctx = mc.getContext('2d');

  function fontSize(count) {
    const t = Math.pow(count / maxCount, 0.55);
    return Math.round(minFS + t * (maxFS - minFS));
  }

  function measure(word, fs) {
    mctx.font = `700 ${fs}px 'Roboto', sans-serif`;
    // КРИТИЧНО: измеряем текст в верхнем регистре, т.к. CSS делает его капсом!
    const tw = mctx.measureText(word.toUpperCase()).width;
    return { w: Math.ceil(tw) + 6, h: Math.ceil(fs * 1.15) };
  }

  const placed = [];

  function intersects(ax1,ay1,ax2,ay2, pad=6) {
    for (const r of placed) {
      if (ax1-pad < r.x2 && ax2+pad > r.x1 && ay1-pad < r.y2 && ay2+pad > r.y1) return true;
    }
    return false;
  }

  function place(word, fs, color, delay) {
    const { w, h } = measure(word, fs);
    const cx = W / 2;
    const cy = H / 2;

    const step = Math.max(2, fs * 0.12);
    let angle = Math.random() * Math.PI * 2;
    let r = 0;

    for (let i = 0; i < 2000; i++) {
      const x1 = Math.round(cx + r * Math.cos(angle) - w / 2);
      const y1 = Math.round(cy + r * Math.sin(angle) - h / 2);
      const x2 = x1 + w;
      const y2 = y1 + h;

      if (x1 >= 2 && y1 >= 2 && x2 <= W - 2 && y2 <= H - 2) {
        if (!intersects(x1, y1, x2, y2)) {
          placed.push({ x1, y1, x2, y2 });

          const el = document.createElement('div');
          el.className = 'word';
          el.textContent = word;
          el.style.cssText = [
            `left:${x1}px`,
            `top:${y1}px`,
            `font-size:${fs}px`,
            `color:${color}`,
            `z-index:${Math.round(fs)}`,
            `animation-delay:${delay}ms`
          ].join(';');

          const countVal = freq.find(f => f[0] === word)[1];
          el.addEventListener('mouseenter', e => showTip(e, word, countVal));
          el.addEventListener('mousemove',  moveTip);
          el.addEventListener('mouseleave', hideTip);

          cloudStage.appendChild(el);
          return true;
        }
      }

      r += step / (Math.PI * 2);
      angle += 0.25;
    }
    return false; 
  }

  freq.forEach(([word, count], i) => {
    place(word, fontSize(count), COLORS[i % COLORS.length], i * 40);
  });
}

function showTip(e, word, count) {
  document.getElementById('ttWord').textContent  = word;
  document.getElementById('ttCount').textContent = count;
  document.getElementById('ttPct').textContent   = ((count / totalResponses) * 100).toFixed(1) + '%';
  tooltip.classList.add('visible');
  moveTip(e);
}

function moveTip(e) {
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let x = e.clientX + 18, y = e.clientY - th / 2;
  if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - 18;
  if (y < 8) y = 8;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTip() { tooltip.classList.remove('visible'); }

let rsTimer;
window.addEventListener('resize', () => {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => {
    if (!cloudView.classList.contains('active')) return;
    const words = parseWords(rawInput.value);
    if (words.length) renderCloud(getFreq(words));
  }, 250);
});
</script>
</body>
</html>
